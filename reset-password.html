<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Defter | Sifre Yenile</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --primary: #17305a;
      --text: #1f2937;
      --muted: #6b7280;
      --ok: #166534;
      --ok-bg: #dcfce7;
      --err: #991b1b;
      --err-bg: #fee2e2;
      --border: #e5e7eb;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }
    .head {
      background: var(--primary);
      color: #fff;
      padding: 16px 18px;
    }
    .head h1 {
      margin: 0;
      font-size: 22px;
    }
    .body {
      padding: 16px 18px 18px;
    }
    .muted {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }
    label {
      display: block;
      margin: 10px 0 6px;
      font-size: 13px;
      color: #374151;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 15px;
      outline: none;
    }
    input:focus {
      border-color: #2563eb;
    }
    button {
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 15px;
      font-weight: 700;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }
    button[disabled] {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 12px;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.4;
      display: none;
    }
    .msg.ok {
      display: block;
      color: var(--ok);
      background: var(--ok-bg);
      border: 1px solid #86efac;
    }
    .msg.err {
      display: block;
      color: var(--err);
      background: var(--err-bg);
      border: 1px solid #fca5a5;
    }
    .links {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }
    .links a {
      color: #1d4ed8;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <header class="head">
      <h1>Sifre Yenileme</h1>
    </header>
    <section class="body">
      <p class="muted">
        Yeni sifrenizi girin. Bu sayfa sadece sifre yenileme e-postasindaki baglanti ile calisir.
      </p>

      <form id="reset-form" novalidate>
        <label for="password">Yeni sifre</label>
        <input id="password" type="password" minlength="8" autocomplete="new-password" required />

        <label for="password2">Yeni sifre (tekrar)</label>
        <input id="password2" type="password" minlength="8" autocomplete="new-password" required />

        <button id="submit-btn" type="submit">Sifreyi Guncelle</button>
      </form>

      <div id="message" class="msg"></div>

      <div class="links">
        <a href="https://edefterotomasyon.com.tr/">Ana sayfaya don</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      const SUPABASE_URL = "https://wsonynytstpxznhbgrrt.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_57DldJ-ui_d3UEFKCcJJCw_oh4E9rfh";
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: false, autoRefreshToken: false }
      });

      const form = document.getElementById("reset-form");
      const button = document.getElementById("submit-btn");
      const passwordInput = document.getElementById("password");
      const password2Input = document.getElementById("password2");
      const message = document.getElementById("message");

      function showMessage(text, isError) {
        message.className = "msg " + (isError ? "err" : "ok");
        message.textContent = text;
      }

      function parseHashParams() {
        const hash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : window.location.hash;
        return new URLSearchParams(hash);
      }

      async function prepareRecoverySession() {
        const params = parseHashParams();
        const errorDescription = params.get("error_description");
        const errorCode = params.get("error_code");
        const accessToken = params.get("access_token");
        const refreshToken = params.get("refresh_token");
        const type = params.get("type");

        if (errorCode || errorDescription) {
          showMessage("Baglanti gecersiz veya suresi dolmus. Lutfen yeniden sifre sifirlama talebi olusturun.", true);
          return false;
        }

        if (type !== "recovery" || !accessToken || !refreshToken) {
          showMessage("Sifre yenileme baglantisi eksik veya gecersiz.", true);
          return false;
        }

        const { error } = await supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        });

        if (error) {
          showMessage("Sifre yenileme oturumu baslatilamadi. Lutfen yeni baglanti alin.", true);
          return false;
        }

        // Tokenlari adres cubugunda birakmamak icin temizle
        window.history.replaceState({}, document.title, window.location.pathname);
        return true;
      }

      form.addEventListener("submit", async function (event) {
        event.preventDefault();
        message.className = "msg";
        message.textContent = "";

        const p1 = passwordInput.value || "";
        const p2 = password2Input.value || "";
        if (p1.length < 8) {
          showMessage("Sifre en az 8 karakter olmali.", true);
          return;
        }
        if (p1 !== p2) {
          showMessage("Sifreler ayni degil.", true);
          return;
        }

        button.disabled = true;
        button.textContent = "Guncelleniyor...";
        try {
          const { error } = await supabase.auth.updateUser({ password: p1 });
          if (error) {
            showMessage(error.message || "Sifre guncellenemedi.", true);
            return;
          }

          await supabase.auth.signOut();
          showMessage("Sifreniz basariyla guncellendi. Uygulamaya yeni sifrenizle giris yapabilirsiniz.", false);
          form.reset();
        } finally {
          button.disabled = false;
          button.textContent = "Sifreyi Guncelle";
        }
      });

      prepareRecoverySession();
    })();
  </script>
</body>
</html>
