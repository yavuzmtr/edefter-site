<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Demo Talebi Alindi</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .thanks {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .card {
      background: #fff;
      padding: 3rem;
      border-radius: 20px;
      max-width: 560px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .card h1 { color: #1a202c; margin-bottom: 0.5rem; }
    .card p { color: #64748b; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="thanks">
    <div class="card">
      <h1>Talebiniz Alindi</h1>
      <p>Demo indirme linki e-posta adresinize gonderildi.</p>
      <p style="margin-top:1rem;font-size:0.9rem;color:#64748b;">
        Lutfen gelen kutusu ve spam klasorunu kontrol edin.
      </p>
    </div>
  </div>
</body>
</html>
